<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F766E"/>
      <stop offset="100%" style="stop-color:#14B8A6"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="120" cy="100" r="130" fill="#0F766E" opacity="0.12" filter="url(#blur1)"/>
  <circle cx="500" cy="320" r="110" fill="#6366f1" opacity="0.1" filter="url(#blur1)"/>

  <!-- Chat window panel -->
  <rect x="60" y="30" width="480" height="340" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Header bar -->
  <rect x="60" y="30" width="480" height="44" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="60" y="56" width="480" height="18" fill="rgba(255,255,255,0.06)"/>
  <!-- AI avatar in header -->
  <circle cx="92" cy="52" r="14" fill="url(#teal)" filter="url(#glow)"/>
  <text x="92" y="57" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">AI</text>
  <text x="115" y="48" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="white">IThink Assistant</text>
  <text x="115" y="62" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Always online · Fact-powered</text>
  <!-- Online dot -->
  <circle cx="108" cy="62" r="3" fill="#14B8A6"/>

  <!-- AI message 1 -->
  <rect x="80" y="90" width="300" height="62" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <polygon points="94,152 80,166 108,152" fill="rgba(255,255,255,0.06)"/>
  <text x="100" y="110" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Hi! Paste any claim and I'll fact-check</text>
  <text x="100" y="126" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">it against verified sources instantly.</text>
  <text x="100" y="144" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.2)">9:41 AM</text>

  <!-- User message -->
  <rect x="220" y="178" width="300" height="48" rx="14" fill="rgba(99,102,241,0.18)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <polygon points="486,226 520,240 500,226" fill="rgba(99,102,241,0.18)"/>
  <text x="240" y="198" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.6)">"Is this article about climate data</text>
  <text x="240" y="214" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.6)">accurate?"</text>

  <!-- AI message 2 with result -->
  <rect x="80" y="244" width="340" height="90" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <polygon points="94,334 80,348 108,334" fill="rgba(255,255,255,0.06)"/>
  <text x="100" y="264" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">I checked 5 sources. Here's what I found:</text>
  <!-- Mini result tags inside bubble -->
  <rect x="100" y="272" width="90" height="20" rx="10" fill="rgba(16,185,129,0.2)" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
  <text x="145" y="286" font-family="Inter,sans-serif" font-size="9" fill="#34d399" text-anchor="middle">✓ 3 Confirmed</text>
  <rect x="200" y="272" width="90" height="20" rx="10" fill="rgba(245,158,11,0.2)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="245" y="286" font-family="Inter,sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">⚠ 1 Partial</text>
  <rect x="300" y="272" width="90" height="20" rx="10" fill="rgba(239,68,68,0.2)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="345" y="286" font-family="Inter,sans-serif" font-size="9" fill="#f87171" text-anchor="middle">✕ 1 False</text>
  <text x="100" y="316" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Overall credibility score: <tspan font-weight="700" fill="#14B8A6">74 / 100</tspan></text>
  <text x="100" y="328" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.2)">9:41 AM</text>

  <!-- Input bar -->
  <rect x="75" y="348" width="450" height="34" rx="17" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="100" y="370" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.2)">Ask me anything about this claim...</text>
  <!-- Send button -->
  <circle cx="508" cy="365" r="13" fill="url(#teal)" filter="url(#glow)"/>
  <polygon points="502,365 510,360 510,370" fill="white"/>
</svg>
