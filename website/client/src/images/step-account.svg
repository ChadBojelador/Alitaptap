<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141414"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC700"/>
      <stop offset="100%" style="stop-color:#E6B400"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="180" cy="100" r="130" fill="#FFC700" opacity="0.12" filter="url(#blur1)"/>
  <circle cx="480" cy="320" r="100" fill="#E6B400" opacity="0.1" filter="url(#blur1)"/>

  <!-- Card panel -->
  <rect x="150" y="40" width="300" height="320" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Avatar circle -->
  <circle cx="300" cy="95" r="32" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1.5"/>
  <circle cx="300" cy="88" r="13" fill="rgba(255,255,255,0.2)"/>
  <ellipse cx="300" cy="115" rx="20" ry="12" fill="rgba(255,255,255,0.15)"/>

  <!-- Title -->
  <text x="300" y="148" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">Create your account</text>
  <text x="300" y="165" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="middle">Sign up free — no credit card needed</text>

  <!-- Email field -->
  <rect x="180" y="180" width="240" height="34" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="196" y="202" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">✉  email@example.com</text>

  <!-- Password field -->
  <rect x="180" y="224" width="240" height="34" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="196" y="246" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">🔒  password</text>

  <!-- Sign up button -->
  <rect x="180" y="270" width="240" height="36" rx="10" fill="url(#purple)" filter="url(#glow)" opacity="0.9"/>
  <text x="300" y="293" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">Get Started</text>

  <!-- Divider -->
  <line x1="180" y1="320" x2="270" y2="320" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="300" y="324" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" text-anchor="middle">or</text>
  <line x1="330" y1="320" x2="420" y2="320" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Google button -->
  <rect x="180" y="332" width="240" height="32" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="210" cy="348" r="8" fill="rgba(255,255,255,0.15)"/>
  <text x="218" y="352" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">G</text>
  <text x="300" y="352" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Continue with Google</text>
</svg>
