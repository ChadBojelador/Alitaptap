<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141414"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="130" fill="#06b6d4" opacity="0.1" filter="url(#blur1)"/>
  <circle cx="500" cy="300" r="100" fill="#3b82f6" opacity="0.1" filter="url(#blur1)"/>

  <!-- Left panel: text with highlights -->
  <rect x="50" y="50" width="260" height="300" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="70" y="76" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" letter-spacing="1">ANALYZED TEXT</text>
  <line x1="65" y1="82" x2="295" y2="82" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Normal text lines -->
  <rect x="68" y="92" width="220" height="7" rx="3" fill="rgba(255,255,255,0.18)"/>
  <rect x="68" y="106" width="200" height="7" rx="3" fill="rgba(255,255,255,0.15)"/>

  <!-- Highlighted inaccuracy (red) -->
  <rect x="68" y="120" width="180" height="7" rx="3" fill="rgba(239,68,68,0.35)"/>
  <rect x="68" y="120" width="180" height="7" rx="3" fill="none" stroke="rgba(239,68,68,0.6)" stroke-width="1"/>
  <text x="254" y="128" font-family="Inter,sans-serif" font-size="8" fill="#f87171">①</text>

  <rect x="68" y="134" width="210" height="7" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="68" y="148" width="190" height="7" rx="3" fill="rgba(255,255,255,0.12)"/>

  <!-- Highlighted warning (yellow) -->
  <rect x="68" y="162" width="200" height="7" rx="3" fill="rgba(245,158,11,0.3)"/>
  <rect x="68" y="162" width="200" height="7" rx="3" fill="none" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>
  <text x="274" y="170" font-family="Inter,sans-serif" font-size="8" fill="#fbbf24">②</text>

  <rect x="68" y="176" width="215" height="7" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="68" y="190" width="180" height="7" rx="3" fill="rgba(255,255,255,0.12)"/>

  <!-- Highlighted verified (green) -->
  <rect x="68" y="204" width="195" height="7" rx="3" fill="rgba(16,185,129,0.25)"/>
  <rect x="68" y="204" width="195" height="7" rx="3" fill="none" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
  <text x="269" y="212" font-family="Inter,sans-serif" font-size="8" fill="#34d399">③</text>

  <rect x="68" y="218" width="210" height="7" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="68" y="232" width="170" height="7" rx="3" fill="rgba(255,255,255,0.1)"/>

  <!-- Legend -->
  <rect x="68" y="260" width="10" height="10" rx="2" fill="rgba(239,68,68,0.5)"/>
  <text x="84" y="270" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Inaccurate claim</text>
  <rect x="68" y="278" width="10" height="10" rx="2" fill="rgba(245,158,11,0.5)"/>
  <text x="84" y="288" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Needs verification</text>
  <rect x="68" y="296" width="10" height="10" rx="2" fill="rgba(16,185,129,0.5)"/>
  <text x="84" y="306" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Verified accurate</text>

  <!-- Right panel: score + notes -->
  <rect x="328" y="50" width="222" height="130" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="348" y="76" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" letter-spacing="1">CREDIBILITY SCORE</text>
  <!-- Score arc -->
  <path d="M 380 145 A 55 55 0 0 1 490 145" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="10" stroke-linecap="round"/>
  <path d="M 380 145 A 55 55 0 0 1 468 100" fill="none" stroke="url(#cyan)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  <text x="435" y="138" font-family="Inter,sans-serif" font-size="26" font-weight="800" fill="white" text-anchor="middle">74</text>
  <text x="435" y="155" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">out of 100</text>

  <!-- Source notes -->
  <rect x="328" y="194" width="222" height="156" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="348" y="218" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" letter-spacing="1">SOURCE NOTES</text>
  <line x1="343" y1="224" x2="535" y2="224" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Note 1 -->
  <circle cx="356" cy="242" r="5" fill="rgba(239,68,68,0.6)"/>
  <text x="368" y="246" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">① No peer-reviewed source</text>
  <rect x="348" y="252" width="160" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>

  <!-- Note 2 -->
  <circle cx="356" cy="272" r="5" fill="rgba(245,158,11,0.6)"/>
  <text x="368" y="276" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">② Outdated statistic (2018)</text>
  <rect x="348" y="282" width="140" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>

  <!-- Note 3 -->
  <circle cx="356" cy="302" r="5" fill="rgba(16,185,129,0.6)"/>
  <text x="368" y="306" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">③ Confirmed by 3 sources</text>
  <rect x="348" y="312" width="150" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>

  <!-- Overall verdict pill -->
  <rect x="348" y="330" width="185" height="26" rx="13" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="440" y="347" font-family="Inter,sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">⚠ Partially Accurate</text>
</svg>
