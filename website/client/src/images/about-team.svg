<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141414"/><stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC700"/><stop offset="100%" style="stop-color:#E6B400"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F766E"/><stop offset="100%" style="stop-color:#14B8A6"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="600" height="500" fill="url(#bg)"/>
  <circle cx="300" cy="250" r="180" fill="#FFC700" opacity="0.06" filter="url(#blur1)"/>

  <!-- Center node: Alitaptap -->
  <circle cx="300" cy="240" r="44" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.5)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="300" y="236" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">Alitaptap</text>
  <text x="300" y="252" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">Team</text>

  <!-- Person nodes -->
  <!-- Top -->
  <line x1="300" y1="196" x2="300" y2="130" stroke="rgba(99,102,241,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="300" cy="110" r="28" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <circle cx="300" cy="103" r="10" fill="rgba(255,255,255,0.2)"/>
  <ellipse cx="300" cy="124" rx="14" ry="8" fill="rgba(255,255,255,0.15)"/>
  <text x="300" y="148" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Engineers</text>

  <!-- Top-right -->
  <line x1="336" y1="210" x2="400" y2="148" stroke="rgba(14,165,233,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="418" cy="132" r="28" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.4)" stroke-width="1"/>
  <circle cx="418" cy="125" r="10" fill="rgba(255,255,255,0.2)"/>
  <ellipse cx="418" cy="146" rx="14" ry="8" fill="rgba(255,255,255,0.15)"/>
  <text x="418" y="170" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Researchers</text>

  <!-- Right -->
  <line x1="344" y1="240" x2="420" y2="240" stroke="rgba(20,184,166,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="448" cy="240" r="28" fill="rgba(20,184,166,0.12)" stroke="rgba(20,184,166,0.4)" stroke-width="1"/>
  <circle cx="448" cy="233" r="10" fill="rgba(255,255,255,0.2)"/>
  <ellipse cx="448" cy="254" rx="14" ry="8" fill="rgba(255,255,255,0.15)"/>
  <text x="448" y="278" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Educators</text>

  <!-- Bottom-right -->
  <line x1="330" y1="272" x2="390" y2="330" stroke="rgba(99,102,241,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="408" cy="348" r="28" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <circle cx="408" cy="341" r="10" fill="rgba(255,255,255,0.2)"/>
  <ellipse cx="408" cy="362" rx="14" ry="8" fill="rgba(255,255,255,0.15)"/>
  <text x="408" y="386" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Data Scientists</text>

  <!-- Bottom-left -->
  <line x1="270" y1="272" x2="210" y2="330" stroke="rgba(14,165,233,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="192" cy="348" r="28" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.4)" stroke-width="1"/>
  <circle cx="192" cy="341" r="10" fill="rgba(255,255,255,0.2)"/>
  <ellipse cx="192" cy="362" rx="14" ry="8" fill="rgba(255,255,255,0.15)"/>
  <text x="192" y="386" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Journalists</text>

  <!-- Left -->
  <line x1="256" y1="240" x2="180" y2="240" stroke="rgba(20,184,166,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="152" cy="240" r="28" fill="rgba(20,184,166,0.12)" stroke="rgba(20,184,166,0.4)" stroke-width="1"/>
  <circle cx="152" cy="233" r="10" fill="rgba(255,255,255,0.2)"/>
  <ellipse cx="152" cy="254" rx="14" ry="8" fill="rgba(255,255,255,0.15)"/>
  <text x="152" y="278" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Psychologists</text>

  <!-- Top-left -->
  <line x1="264" y1="210" x2="200" y2="148" stroke="rgba(99,102,241,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="182" cy="132" r="28" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <circle cx="182" cy="125" r="10" fill="rgba(255,255,255,0.2)"/>
  <ellipse cx="182" cy="146" rx="14" ry="8" fill="rgba(255,255,255,0.15)"/>
  <text x="182" y="170" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">AI Ethics</text>

  <!-- Shared value pill -->
  <rect x="185" y="430" width="230" height="30" rx="15" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.35)" stroke-width="1"/>
  <text x="300" y="450" font-family="Inter,sans-serif" font-size="10" fill="#E6B400" text-anchor="middle">United by: Truth Matters</text>
</svg>
