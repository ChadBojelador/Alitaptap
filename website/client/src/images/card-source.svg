<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <circle cx="150" cy="120" r="120" fill="#6366f1" opacity="0.15" filter="url(#blur1)"/>
  <circle cx="480" cy="280" r="100" fill="#0ea5e9" opacity="0.12" filter="url(#blur1)"/>

  <!-- Glass panel -->
  <rect x="60" y="60" width="480" height="280" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Document icon glass card -->
  <rect x="100" y="100" width="160" height="200" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <rect x="120" y="130" width="80" height="8" rx="4" fill="url(#purple)" opacity="0.9"/>
  <rect x="120" y="150" width="120" height="6" rx="3" fill="rgba(255,255,255,0.3)"/>
  <rect x="120" y="165" width="100" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="120" y="180" width="110" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="120" y="195" width="90" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="120" y="215" width="120" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="120" y="230" width="80" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>

  <!-- Checkmark badge -->
  <circle cx="240" cy="110" r="22" fill="url(#purple)" opacity="0.9"/>
  <polyline points="230,110 238,118 252,102" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Verified tags -->
  <rect x="300" y="110" width="110" height="32" rx="16" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.5)" stroke-width="1"/>
  <circle cx="320" cy="126" r="6" fill="#6366f1"/>
  <rect x="332" y="121" width="60" height="10" rx="5" fill="rgba(255,255,255,0.5)"/>

  <rect x="300" y="155" width="130" height="32" rx="16" fill="rgba(14,165,233,0.2)" stroke="rgba(14,165,233,0.5)" stroke-width="1"/>
  <circle cx="320" cy="171" r="6" fill="#0ea5e9"/>
  <rect x="332" y="166" width="80" height="10" rx="5" fill="rgba(255,255,255,0.5)"/>

  <rect x="300" y="200" width="120" height="32" rx="16" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.5)" stroke-width="1"/>
  <circle cx="320" cy="216" r="6" fill="#6366f1"/>
  <rect x="332" y="211" width="70" height="10" rx="5" fill="rgba(255,255,255,0.5)"/>

  <!-- Score bar -->
  <rect x="300" y="255" width="200" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>
  <rect x="300" y="255" width="160" height="10" rx="5" fill="url(#purple)" opacity="0.8"/>
  <text x="300" y="285" font-family="Inter,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Source Credibility Score</text>
  <text x="490" y="285" font-family="Inter,sans-serif" font-size="11" fill="#6366f1" font-weight="bold">80%</text>
</svg>
