<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141414"/><stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F766E"/><stop offset="100%" style="stop-color:#14B8A6"/>
    </linearGradient>
    <linearGradient id="tealH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0F766E"/><stop offset="100%" style="stop-color:#14B8A6"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="600" height="500" fill="url(#bg)"/>
  <circle cx="300" cy="230" r="200" fill="#0F766E" opacity="0.08" filter="url(#blur1)"/>

  <!-- Bullseye rings -->
  <circle cx="300" cy="230" r="150" fill="none" stroke="rgba(20,184,166,0.12)" stroke-width="1.5"/>
  <circle cx="300" cy="230" r="110" fill="none" stroke="rgba(20,184,166,0.18)" stroke-width="1.5"/>
  <circle cx="300" cy="230" r="70" fill="none" stroke="rgba(20,184,166,0.28)" stroke-width="1.5"/>
  <circle cx="300" cy="230" r="35" fill="rgba(20,184,166,0.12)" stroke="rgba(20,184,166,0.5)" stroke-width="1.5"/>

  <!-- Crosshair lines -->
  <line x1="300" y1="60" x2="300" y2="400" stroke="rgba(20,184,166,0.15)" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="130" y1="230" x2="470" y2="230" stroke="rgba(20,184,166,0.15)" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Center target -->
  <circle cx="300" cy="230" r="14" fill="url(#teal)" filter="url(#glow)"/>
  <circle cx="300" cy="230" r="6" fill="white"/>

  <!-- Arrow hitting target -->
  <line x1="460" y1="80" x2="318" y2="218" stroke="url(#teal)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <polygon points="310,212 322,208 318,222" fill="#14B8A6"/>

  <!-- Feature pills around -->
  <rect x="80" y="130" width="120" height="32" rx="16" fill="rgba(20,184,166,0.12)" stroke="rgba(20,184,166,0.35)" stroke-width="1"/>
  <text x="140" y="151" font-family="Inter,sans-serif" font-size="10" fill="#14B8A6" text-anchor="middle">Source Validation</text>

  <rect x="400" y="130" width="120" height="32" rx="16" fill="rgba(20,184,166,0.12)" stroke="rgba(20,184,166,0.35)" stroke-width="1"/>
  <text x="460" y="151" font-family="Inter,sans-serif" font-size="10" fill="#14B8A6" text-anchor="middle">Fact Checking</text>

  <rect x="60" y="310" width="130" height="32" rx="16" fill="rgba(20,184,166,0.12)" stroke="rgba(20,184,166,0.35)" stroke-width="1"/>
  <text x="125" y="331" font-family="Inter,sans-serif" font-size="10" fill="#14B8A6" text-anchor="middle">Credibility Score</text>

  <rect x="410" y="310" width="120" height="32" rx="16" fill="rgba(20,184,166,0.12)" stroke="rgba(20,184,166,0.35)" stroke-width="1"/>
  <text x="470" y="331" font-family="Inter,sans-serif" font-size="10" fill="#14B8A6" text-anchor="middle">Bias Detection</text>

  <!-- Lines from pills to center -->
  <line x1="200" y1="146" x2="260" y2="200" stroke="rgba(20,184,166,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="400" y1="146" x2="340" y2="200" stroke="rgba(20,184,166,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="190" y1="310" x2="268" y2="258" stroke="rgba(20,184,166,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="410" y1="310" x2="332" y2="258" stroke="rgba(20,184,166,0.2)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom label -->
  <rect x="210" y="420" width="180" height="30" rx="15" fill="rgba(20,184,166,0.15)" stroke="rgba(20,184,166,0.4)" stroke-width="1"/>
  <text x="300" y="440" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#14B8A6" text-anchor="middle">Truth Accessible to All</text>
</svg>
