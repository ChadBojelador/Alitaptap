<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141414"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="300" cy="150" r="150" fill="#06b6d4" opacity="0.1" filter="url(#blur1)"/>
  <circle cx="500" cy="350" r="100" fill="#3b82f6" opacity="0.1" filter="url(#blur1)"/>

  <!-- Gauge arc background -->
  <path d="M 130 240 A 170 170 0 0 1 470 240" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="18" stroke-linecap="round"/>
  <!-- Gauge arc fill -->
  <path d="M 130 240 A 170 170 0 0 1 390 115" fill="none" stroke="url(#arc)" stroke-width="18" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>

  <!-- Center score -->
  <text x="300" y="210" font-family="Inter,sans-serif" font-size="52" font-weight="800" fill="white" text-anchor="middle">82</text>
  <text x="300" y="235" font-family="Inter,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">CREDIBILITY SCORE</text>

  <!-- Needle -->
  <line x1="300" y1="240" x2="388" y2="118" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <circle cx="300" cy="240" r="8" fill="url(#cyan)"/>

  <!-- Labels -->
  <text x="118" y="268" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">LOW</text>
  <text x="300" y="268" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">MED</text>
  <text x="482" y="268" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">HIGH</text>

  <!-- Bottom tags -->
  <rect x="85" y="295" width="120" height="28" rx="14" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
  <text x="145" y="314" font-family="Inter,sans-serif" font-size="11" fill="#34d399" text-anchor="middle">✓ High Credibility</text>

  <rect x="220" y="295" width="130" height="28" rx="14" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="285" y="314" font-family="Inter,sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle">⚠ Needs Review</text>

  <rect x="365" y="295" width="110" height="28" rx="14" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="420" y="314" font-family="Inter,sans-serif" font-size="11" fill="#f87171" text-anchor="middle">✕ Likely False</text>

  <text x="300" y="355" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.2)" text-anchor="middle">Real-time language pattern analysis</text>
</svg>
