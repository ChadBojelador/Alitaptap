<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141414"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F766E"/>
      <stop offset="100%" style="stop-color:#14B8A6"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC700"/>
      <stop offset="100%" style="stop-color:#E6B400"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="300" cy="200" r="160" fill="#14B8A6" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="500" cy="80" r="100" fill="#FFC700" opacity="0.1" filter="url(#blur1)"/>

  <!-- Glass panel -->
  <rect x="70" y="50" width="460" height="300" rx="20" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Progress chart bars -->
  <text x="100" y="90" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" letter-spacing="1">CRITICAL THINKING PROGRESS</text>
  <rect x="100" y="100" width="400" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Week labels -->
  <text x="120" y="290" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">W1</text>
  <text x="185" y="290" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">W2</text>
  <text x="250" y="290" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">W3</text>
  <text x="315" y="290" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">W4</text>
  <text x="380" y="290" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">W5</text>
  <text x="445" y="290" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">W6</text>

  <!-- Bars -->
  <rect x="100" y="230" width="40" height="50" rx="6" fill="rgba(99,102,241,0.3)"/>
  <rect x="165" y="205" width="40" height="75" rx="6" fill="rgba(99,102,241,0.45)"/>
  <rect x="230" y="180" width="40" height="100" rx="6" fill="rgba(99,102,241,0.55)"/>
  <rect x="295" y="155" width="40" height="125" rx="6" fill="url(#purple)" opacity="0.7"/>
  <rect x="360" y="130" width="40" height="150" rx="6" fill="url(#purple)" opacity="0.85"/>
  <rect x="425" y="110" width="40" height="170" rx="6" fill="url(#teal)" opacity="0.9"/>

  <!-- Trend line -->
  <polyline points="120,225 185,200 250,175 315,150 380,125 445,105" fill="none" stroke="#14B8A6" stroke-width="2" stroke-dasharray="0" opacity="0.7"/>
  <circle cx="120" cy="225" r="4" fill="#FFC700"/>
  <circle cx="185" cy="200" r="4" fill="#FFC700"/>
  <circle cx="250" cy="175" r="4" fill="#FFC700"/>
  <circle cx="315" cy="150" r="4" fill="#FFC700"/>
  <circle cx="380" cy="125" r="4" fill="#14B8A6"/>
  <circle cx="445" cy="105" r="5" fill="#14B8A6" stroke="rgba(20,184,166,0.4)" stroke-width="4"/>

  <!-- Score badge -->
  <rect x="390" y="68" width="120" height="32" rx="16" fill="rgba(20,184,166,0.15)" stroke="rgba(20,184,166,0.4)" stroke-width="1"/>
  <text x="450" y="89" font-family="Inter,sans-serif" font-size="11" fill="#14B8A6" text-anchor="middle" font-weight="700">↑ +42% accuracy</text>

  <text x="300" y="360" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.2)" text-anchor="middle">Track your growth · Build better thinking habits</text>
</svg>
