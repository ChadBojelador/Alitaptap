<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141414"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC700"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="500" cy="80" r="130" fill="#FFC700" opacity="0.12" filter="url(#blur1)"/>
  <circle cx="100" cy="330" r="100" fill="#a855f7" opacity="0.1" filter="url(#blur1)"/>

  <!-- Editor window -->
  <rect x="60" y="45" width="480" height="310" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Window title bar -->
  <rect x="60" y="45" width="480" height="36" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="60" y="63" width="480" height="18" fill="rgba(255,255,255,0.05)"/>
  <circle cx="86" cy="63" r="6" fill="rgba(239,68,68,0.5)"/>
  <circle cx="106" cy="63" r="6" fill="rgba(245,158,11,0.5)"/>
  <circle cx="126" cy="63" r="6" fill="rgba(34,197,94,0.5)"/>
  <text x="300" y="68" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">Alitaptap Editor</text>

  <!-- Toolbar -->
  <rect x="75" y="92" width="450" height="28" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="92" y="110" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="rgba(255,255,255,0.4)">B</text>
  <text x="108" y="110" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" font-style="italic">I</text>
  <text x="122" y="110" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">U</text>
  <line x1="140" y1="96" x2="140" y2="116" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Paste icon hint -->
  <rect x="148" y="99" width="40" height="18" rx="5" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="168" y="112" font-family="Inter,sans-serif" font-size="9" fill="#E6B400" text-anchor="middle">Paste</text>

  <!-- Text content area — simulating pasted article -->
  <!-- Title line -->
  <rect x="80" y="132" width="280" height="11" rx="4" fill="rgba(255,255,255,0.35)"/>
  <!-- Subtitle -->
  <rect x="80" y="152" width="200" height="8" rx="3" fill="rgba(255,255,255,0.2)"/>

  <!-- Body text lines -->
  <rect x="80" y="172" width="440" height="7" rx="3" fill="rgba(255,255,255,0.18)"/>
  <rect x="80" y="186" width="420" height="7" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="80" y="200" width="430" height="7" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="80" y="214" width="380" height="7" rx="3" fill="rgba(255,255,255,0.12)"/>

  <!-- Highlighted selection (the pasted text being selected) -->
  <rect x="80" y="230" width="440" height="7" rx="3" fill="rgba(99,102,241,0.35)"/>
  <rect x="80" y="244" width="400" height="7" rx="3" fill="rgba(99,102,241,0.3)"/>
  <rect x="80" y="258" width="350" height="7" rx="3" fill="rgba(99,102,241,0.25)"/>

  <!-- More body -->
  <rect x="80" y="274" width="440" height="7" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="80" y="288" width="300" height="7" rx="3" fill="rgba(255,255,255,0.1)"/>

  <!-- Cursor blink -->
  <rect x="308" y="288" width="2" height="12" rx="1" fill="rgba(99,102,241,0.9)"/>

  <!-- Paste tooltip -->
  <rect x="370" y="222" width="150" height="36" rx="10" fill="rgba(79,70,229,0.25)" stroke="rgba(99,102,241,0.5)" stroke-width="1"/>
  <text x="445" y="237" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">📋 Text pasted</text>
  <text x="445" y="251" font-family="Inter,sans-serif" font-size="9" fill="#E6B400" text-anchor="middle">Ready to analyze</text>

  <!-- Word count -->
  <text x="480" y="348" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.2)" text-anchor="end">342 words</text>
</svg>
