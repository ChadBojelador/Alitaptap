<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/><stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F766E"/><stop offset="100%" style="stop-color:#14B8A6"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="600" height="500" fill="url(#bg)"/>
  <circle cx="150" cy="150" r="150" fill="#6366f1" opacity="0.07" filter="url(#blur1)"/>
  <circle cx="480" cy="380" r="130" fill="#14B8A6" opacity="0.06" filter="url(#blur1)"/>

  <!-- Left panel: Generic AI (black box) -->
  <rect x="40" y="60" width="230" height="370" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="155" y="90" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1">GENERIC AI</text>
  <rect x="65" y="105" width="180" height="50" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="155" y="126" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">Input: "Is this claim true?"</text>
  <text x="155" y="142" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.2)" text-anchor="middle">Any topic, any question</text>
  <!-- Black box -->
  <rect x="90" y="175" width="130" height="80" rx="10" fill="rgba(0,0,0,0.5)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="155" y="220" font-family="Inter,sans-serif" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="middle">⬛ Black Box</text>
  <!-- Output: just true/false -->
  <rect x="65" y="275" width="180" height="40" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="155" y="300" font-family="Inter,102,241,0.5)" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">Output: "True" or "False"</text>
  <!-- No explanation -->
  <rect x="65" y="325" width="180" height="30" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="155" y="345" font-family="Inter,sans-serif" font-size="9" fill="rgba(239,68,68,0.6)" text-anchor="middle">✕ No explanation provided</text>
  <rect x="65" y="365" width="180" height="30" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="155" y="385" font-family="Inter,sans-serif" font-size="9" fill="rgba(239,68,68,0.6)" text-anchor="middle">✕ No source references</text>

  <!-- VS divider -->
  <line x1="300" y1="80" x2="300" y2="420" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="6,4"/>
  <circle cx="300" cy="250" r="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="300" y="255" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.4)" text-anchor="middle">VS</text>

  <!-- Right panel: IThink -->
  <rect x="330" y="60" width="230" height="370" rx="16" fill="rgba(99,102,241,0.06)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="445" y="90" font-family="Inter,sans-serif" font-size="10" fill="rgba(99,102,241,0.8)" text-anchor="middle" letter-spacing="1">ITHINK AI</text>
  <rect x="355" y="105" width="180" height="50" rx="10" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="445" y="126" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">Input: "Is this claim true?"</text>
  <text x="445" y="142" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" text-anchor="middle">Credibility-focused analysis</text>
  <!-- Transparent box -->
  <rect x="380" y="175" width="130" height="80" rx="10" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.4)" stroke-width="1" filter="url(#glow)"/>
  <text x="445" y="205" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Fact-check datasets</text>
  <text x="445" y="220" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Source repositories</text>
  <text x="445" y="235" font-family="Inter,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Bias pattern models</text>
  <!-- Output with score -->
  <rect x="355" y="275" width="180" height="40" rx="10" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="445" y="300" font-family="Inter,sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">Score: 82% + Why</text>
  <!-- Checkmarks -->
  <rect x="355" y="325" width="180" height="30" rx="8" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
  <text x="445" y="345" font-family="Inter,sans-serif" font-size="9" fill="#34d399" text-anchor="middle">✓ Full reasoning shown</text>
  <rect x="355" y="365" width="180" height="30" rx="8" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
  <text x="445" y="385" font-family="Inter,sans-serif" font-size="9" fill="#34d399" text-anchor="middle">✓ Cited source references</text>

  <!-- Bottom label -->
  <rect x="330" y="445" width="230" height="30" rx="15" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.35)" stroke-width="1"/>
  <text x="445" y="465" font-family="Inter,sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">Purpose-built for credibility</text>
</svg>
