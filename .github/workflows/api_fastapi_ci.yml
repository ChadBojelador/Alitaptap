name: API FastAPI CI

on:
  push:
    paths:
      - 'services/api_fastapi/**'
      - '.github/workflows/api_fastapi_ci.yml'
  pull_request:
    paths:
      - 'services/api_fastapi/**'
      - '.github/workflows/api_fastapi_ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api_fastapi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q
