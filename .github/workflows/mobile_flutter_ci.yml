name: Mobile Flutter CI

on:
  push:
    paths:
      - 'apps/mobile_flutter/**'
      - '.github/workflows/mobile_flutter_ci.yml'
  pull_request:
    paths:
      - 'apps/mobile_flutter/**'
      - '.github/workflows/mobile_flutter_ci.yml'

jobs:
  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile_flutter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/mobile_flutter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: apps/mobile_flutter/build/ios/iphoneos/Runner.app
