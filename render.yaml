services:
  - type: web
    name: alitaptap-api
    runtime: python
    rootDir: services/api_fastapi
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: alitaptap
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: AI_TITLE_SUGGESTIONS_ENABLED
        value: false
      - key: AI_SDG_TAGGING_ENABLED
        value: false
      - key: AI_ISSUE_VALIDATION_ENABLED
        value: false
